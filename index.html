<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おうちCFO マネーセミナー｜勝目麻希</title>
  <meta name="description" content="家計・教育費・NISA・老後資金を、家庭の未来設計としてやさしく整理するマネーセミナー。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">おうちCFO</div>
    </div>
  </header>

  <main>

    <!-- HERO -->
    <section class="hero">
      <div class="container hero-grid">

        <div class="hero-copy">
          <p class="eyebrow">なんとなくの不安を、判断軸へ</p>
          <h1>
            「お金の不安」を<br>
            <span>わが家の設計</span>に変える
          </h1>
          <p class="lead">
            教育費・NISA・老後資金を、情報ではなく“設計”で考える。
            家庭ごとの最適解を見つけるためのマネーセミナーです。
          </p>

          <div class="hero-actions">
            <a class="btn primary" href="#entry">無料で参加する</a>
          </div>
        </div>

        <!-- 写真エリア -->
        <div class="hero-image">
          <img src="assets/maki-profile.jpg" alt="講師 勝目麻希" />
        </div>

      </div>
    </section>

    <!-- CONCEPT -->
    <section class="section white">
      <div class="container center">
        <h2>情報ではなく、判断軸を持つ</h2>
        <p>
          NISA、教育費、老後資金。
          情報はたくさんあるのに、自分に合う選択がわからない。
        </p>
        <p>
          このセミナーでは、「何を選ぶか」ではなく
          「どう考えるか」を整理します。
        </p>
      </div>
    </section>

    <!-- CTA -->
    <section id="entry" class="cta">
      <div class="container center">
        <h2>まずは気軽にご参加ください</h2>
        <a class="btn primary" href="#">参加する</a>
      </div>
    </section>

  </main>

</body>
</html>
